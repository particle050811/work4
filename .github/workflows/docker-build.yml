name: Docker Build

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  docker-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ./video-platform
          file: ./video-platform/Dockerfile
          push: false
          tags: fanone-video:ci
